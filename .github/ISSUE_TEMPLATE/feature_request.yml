name: ✨ Feature request
description: Suggest a new language, scope or workbench improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the language support, scope or UI tweak you'd like.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why?
      description: What problem does this solve or improve?
